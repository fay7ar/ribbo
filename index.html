<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ribbo - القصص والدردشة</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: white;
      direction: rtl;
    }

    /* شاشة تسجيل الدخول */
    .auth-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .auth-card h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .auth-card input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s;
    }

    .auth-card input:focus {
      outline: none;
      border-color: #764ba2;
    }

    .auth-card button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: transform 0.2s;
    }

    .auth-card button:active {
      transform: scale(0.98);
    }

    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .error-message {
      background: #fee;
      color: #c00;
    }

    .waiting-message {
      background: #fff3cd;
      color: #856404;
    }

    /* التطبيق الرئيسي - يظهر بعد الموافقة */
    .app-main {
      display: none;
      min-height: 100vh;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #121212;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-title {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #FFFC00, #FF6B00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-icon {
      font-size: 24px;
      cursor: pointer;
      color: white;
    }

    /* Navigation */
    .nav-bar {
      display: flex;
      justify-content: space-around;
      background: #121212;
      border-top: 1px solid #333;
      padding: 10px 0;
      position: fixed;
      bottom: 0;
      width: 100%;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #666;
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: #FFFC00;
    }

    .nav-item i {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .content {
      flex: 1;
      padding-bottom: 70px;
      padding-top: 10px;
    }

    /* صفحة القصص */
    .stories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .story-card {
      position: relative;
      aspect-ratio: 9/16;
      border-radius: 15px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .story-card:hover {
      transform: scale(1.02);
    }

    .story-card img, .story-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .story-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 10px;
      font-size: 12px;
    }

    .add-story {
      border: 2px dashed #FFFC00;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
    }

    .add-story i {
      font-size: 40px;
      color: #FFFC00;
    }

    /* صفحة الأصدقاء */
    .friends-list, .requests-list {
      padding: 15px;
    }

    .friend-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 15px;
    }

    .friend-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .friend-avatar {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .friend-name {
      font-weight: bold;
    }

    .friend-username {
      font-size: 12px;
      color: #999;
    }

    .btn-icon {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      margin: 0 5px;
    }

    .btn-accept {
      color: #4caf50;
    }

    .btn-reject {
      color: #f44336;
    }

    .btn-block {
      color: #ff9800;
    }

    .btn-chat {
      color: #2196f3;
    }

    /* صفحة الدردشة */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #1a1a1a;
    }

    .chat-messages {
      height: calc(100vh - 200px);
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      margin: 10px 0;
      display: flex;
      flex-direction: column;
    }

    .message.sent {
      align-items: flex-end;
    }

    .message.received {
      align-items: flex-start;
    }

    .message-bubble {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 20px;
      margin: 5px 0;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .message.received .message-bubble {
      background: #1a1a1a;
      color: white;
    }

    .message-img {
      max-width: 200px;
      border-radius: 15px;
    }

    .chat-input {
      display: flex;
      padding: 15px;
      background: #1a1a1a;
      gap: 10px;
      position: fixed;
      bottom: 60px;
      width: 100%;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #333;
      color: white;
    }

    /* كاميرا للقصص */
    .camera-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 2000;
      display: none;
      flex-direction: column;
    }

    #videoElement {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-controls {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .camera-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: white;
      border: 3px solid #FFFC00;
      cursor: pointer;
    }

    /* اختيار الصوت للقصة */
    .sound-picker {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      background: #1a1a1a;
      border-radius: 20px;
      padding: 15px;
      display: none;
      z-index: 2001;
    }

    .sound-item {
      padding: 10px;
      margin: 5px 0;
      background: #333;
      border-radius: 10px;
      cursor: pointer;
    }

    h3 {
      padding: 15px;
      color: #FFFC00;
    }

    .tab-bar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1a1a1a;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      border-radius: 10px;
    }

    .tab.active {
      background: #FFFC00;
      color: black;
    }

    .hide {
      display: none;
    }
  </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <h1>📸 Ribbo</h1>
    <p>سجل دخولك للبدء</p>
    <input type="text" id="regUsername" placeholder="اسم المستخدم" autocomplete="off">
    <input type="tel" id="regPhone" placeholderرقم الهاتف" autocomplete="off">
    <button onclick="register()">تسجيل الدخول</button>
    <div id="authMessage"></div>
  </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="app-main" id="appMain">
  <div class="header">
    <i class="fas fa-user header-icon" onclick="logout()"></i>
    <div class="app-title">Ribbo</div>
    <i class="fas fa-music header-icon" onclick="showSounds()"></i>
  </div>

  <div class="content" id="contentArea">
    <!-- صفحة القصص -->
    <div id="storiesPage">
      <div class="stories-grid" id="storiesGrid">
        <div class="story-card add-story" onclick="openCamera()">
          <i class="fas fa-plus"></i>
          <div class="story-info">إضافة قصة</div>
        </div>
      </div>
    </div>

    <!-- صفحة الأصدقاء (مخفية) -->
    <div id="friendsPage" style="display: none;">
      <div class="tab-bar">
        <div class="tab active" onclick="showFriendsTab('friends')">الأصدقاء</div>
        <div class="tab" onclick="showFriendsTab('requests')">الطلبات</div>
        <div class="tab" onclick="showFriendsTab('search')">بحث</div>
      </div>
      <div id="friendsList"></div>
      <div id="requestsList" style="display: none;"></div>
      <div id="searchList" style="display: none;">
        <input type="text" id="searchInput" placeholder="بحث باسم المستخدم..." style="width: 90%; margin: 10px; padding: 10px; border-radius: 20px;">
        <button onclick="searchUsers()" style="margin: 10px; padding: 10px 20px;">بحث</button>
        <div id="searchResults"></div>
      </div>
    </div>

    <!-- صفحة الدردشة (مخفية) -->
    <div id="chatPage" style="display: none;">
      <div id="chatList">
        <h3>المحادثات</h3>
        <div id="conversationsList"></div>
      </div>
      <div id="chatWindow" style="display: none;">
        <div class="chat-header">
          <i class="fas fa-arrow-right" onclick="closeChat()"></i>
          <span id="chatFriendName"></span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <i class="fas fa-image" style="font-size: 24px; cursor: pointer;" onclick="sendImage()"></i>
          <input type="text" id="messageInput" placeholder="اكتب رسالة...">
          <i class="fas fa-paper-plane" style="font-size: 24px; cursor: pointer;" onclick="sendMessage()"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item active" onclick="switchPage('stories')">
      <i class="fas fa-film"></i>
      <span>القصص</span>
    </div>
    <div class="nav-item" onclick="switchPage('friends')">
      <i class="fas fa-users"></i>
      <span>الأصدقاء</span>
    </div>
    <div class="nav-item" onclick="switchPage('chat')">
      <i class="fas fa-comment-dots"></i>
      <span>الدردشة</span>
    </div>
  </div>
</div>

<!-- كاميرا القصص -->
<div class="camera-modal" id="cameraModal">
  <video id="videoElement" autoplay playsinline></video>
  <canvas id="canvasElement" style="display: none;"></canvas>
  <div class="camera-controls">
    <button class="camera-btn" onclick="captureStory()"></button>
  </div>
  <i class="fas fa-times" style="position: absolute; top: 20px; left: 20px; font-size: 30px; color: white; cursor: pointer;" onclick="closeCamera()"></i>
</div>

<!-- اختيار الصوت -->
<div class="sound-picker" id="soundPicker">
  <h3>اختر صوتاً للقصة</h3>
  <div id="soundsList"></div>
  <button onclick="closeSoundPicker()" style="margin-top: 10px; padding: 10px; background: #f44336; border: none; border-radius: 10px; color: white;">تخطي</button>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAVkrRal-uya-0YPd87jR1QqJwRTVGKm-0",
    authDomain: "ribbo-ly-abde6.firebaseapp.com",
    databaseURL: "https://ribbo-ly-abde6-default-rtdb.firebaseio.com",
    projectId: "ribbo-ly-abde6",
    storageBucket: "ribbo-ly-abde6.firebasestorage.app",
    messagingSenderId: "69342017067",
    appId: "1:69342017067:web:cf2d2df4c9bc4a614c1c6e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();

  let currentUser = null;
  let currentStream = null;
  let selectedSound = null;
  let currentChatWith = null;

  // تسجيل الدخول
  async function register() {
    const username = document.getElementById('regUsername').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const msgDiv = document.getElementById('authMessage');

    if (!username || !phone) {
      msgDiv.innerHTML = '<div class="message error-message">يرجى ملء جميع الحقول</div>';
      return;
    }

    // التحقق من وجود المستخدم
    const snapshot = await db.ref('users').orderByChild('username').equalTo(username).once('value');
    let userId;
    
    if (snapshot.exists()) {
      userId = Object.keys(snapshot.val())[0];
      const userData = snapshot.val()[userId];
      if (userData.status === 'approved') {
        currentUser = { id: userId, ...userData };
        showApp();
      } else if (userData.status === 'pending') {
        msgDiv.innerHTML = '<div class="message waiting-message">⏳ حسابك قيد المراجعة، انتظر الموافقة</div>';
      } else if (userData.status === 'blocked') {
        msgDiv.innerHTML = '<div class="message error-message">🚫 حسابك محظور</div>';
      }
      return;
    }

    // إنشاء مستخدم جديد
    const newUserRef = db.ref('users').push();
    await newUserRef.set({
      username: username,
      phone: phone,
      status: 'pending',
      createdAt: Date.now(),
      friends: {},
      blocked: {}
    });
    msgDiv.innerHTML = '<div class="message waiting-message">✅ تم إرسال طلبك، انتظر موافقة الأدمن</div>';
  }

  function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appMain').style.display = 'flex';
    loadStories();
    loadFriends();
    loadConversations();
    loadSounds();
  }

  function logout() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appMain').style.display = 'none';
  }

  // تحميل القصص
  function loadStories() {
    db.ref('stories').once('value', snapshot => {
      const stories = snapshot.val();
      const container = document.getElementById('storiesGrid');
      const existingAdd = container.querySelector('.add-story');
      container.innerHTML = '';
      container.appendChild(existingAdd);
      
      if (stories) {
        Object.entries(stories).forEach(([id, story]) => {
          if (story.userId !== currentUser.id && !isBlocked(story.userId)) {
            const storyDiv = document.createElement('div');
            storyDiv.className = 'story-card';
            storyDiv.onclick = () => viewStory(story);
            if (story.type === 'image') {
              storyDiv.innerHTML = `<img src="${story.url}" loading="lazy"><div class="story-info">@${story.username}</div>`;
            } else {
              storyDiv.innerHTML = `<video src="${story.url}" loading="lazy"></video><div class="story-info">@${story.username}</div>`;
            }
            container.appendChild(storyDiv);
          }
        });
      }
    });
  }

  // كاميرا القصة
  async function openCamera() {
    document.getElementById('cameraModal').style.display = 'flex';
    const video = document.getElementById('videoElement');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    currentStream = stream;
    video.srcObject = stream;
  }

  function closeCamera() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    document.getElementById('cameraModal').style.display = 'none';
  }

  async function captureStory() {
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    canvas.toBlob(async (blob) => {
      const fileName = `stories/${currentUser.id}_${Date.now()}.jpg`;
      const uploadTask = storage.ref(fileName).put(blob);
      uploadTask.on('state_changed', null, null, async () => {
        const url = await uploadTask.snapshot.ref.getDownloadURL();
        
        // إضافة الصوت إذا تم اختياره
        const storyData = {
          userId: currentUser.id,
          username: currentUser.username,
          type: 'image',
          url: url,
          time: Date.now(),
          sound: selectedSound
        };
        
        await db.ref('stories').push(storyData);
        selectedSound = null;
        closeCamera();
        loadStories();
        alert('تم نشر القصة بنجاح!');
      });
    }, 'image/jpeg');
  }

  // إدارة الأصدقاء
  async function loadFriends() {
    const friendsList = document.getElementById('friendsList');
    friendsList.innerHTML = '';
    const friends = currentUser.friends || {};
    
    for (let friendId of Object.keys(friends)) {
      const friendSnap = await db.ref(`users/${friendId}`).once('value');
      const friend = friendSnap.val();
      if (friend && friend.status === 'approved') {
        friendsList.innerHTML += `
          <div class="friend-card">
            <div class="friend-info">
              <div class="friend-avatar">👤</div>
              <div>
                <div class="friend-name">${friend.username}</div>
                <div class="friend-username">@${friend.username}</div>
              </div>
            </div>
            <div>
              <i class="fas fa-comment btn-icon btn-chat" onclick="startChat('${friendId}', '${friend.username}')"></i>
              <i class="fas fa-ban btn-icon btn-block" onclick="blockUser('${friendId}')"></i>
            </div>
          </div>
        `;
      }
    }
  }

  async function searchUsers() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const snapshot = await db.ref('users').once('value');
    const results = document.getElementById('searchResults');
    results.innerHTML = '';
    
    snapshot.forEach(userSnap => {
      const user = userSnap.val();
      if (user.status === 'approved' && user.username.toLowerCase().includes(query) && user.id !== currentUser.id) {
        const isFriend = currentUser.friends?.[userSnap.key];
        const isRequested = currentUser.friendRequests?.[userSnap.key];
        results.innerHTML += `
          <div class="friend-card">
            <div class="friend-info">
              <div>${user.username}</div>
            </div>
            ${!isFriend && !isRequested ? `<button onclick="sendFriendRequest('${userSnap.key}')">➕ إضافة</button>` : ''}
            ${isRequested ? '<span>⏳ في الانتظار</span>' : ''}
          </div>
        `;
      }
    });
  }

  async function sendFriendRequest(toId) {
    await db.ref(`friendRequests/${toId}/${currentUser.id}`).set({
      fromId: currentUser.id,
      fromUsername: currentUser.username,
      time: Date.now()
    });
    alert('تم إرسال الطلب');
  }

  // الدردشة
  async function startChat(userId, username) {
    currentChatWith = userId;
    document.getElementById('chatList').style.display = 'none';
    document.getElementById('chatWindow').style.display = 'block';
    document.getElementById('chatFriendName').innerText = username;
    loadMessages();
  }

  async function loadMessages() {
    const messagesRef = db.ref(`messages/${currentUser.id}_${currentChatWith}`).orderByChild('time');
    messagesRef.on('value', snapshot => {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      snapshot.forEach(msgSnap => {
        const msg = msgSnap.val();
        const div = document.createElement('div');
        div.className = `message ${msg.fromId === currentUser.id ? 'sent' : 'received'}`;
        if (msg.type === 'text') {
          div.innerHTML = `<div class="message-bubble">${msg.text}</div>`;
        } else {
          div.innerHTML = `<img src="${msg.url}" class="message-img">`;
        }
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    
    await db.ref(`messages/${currentUser.id}_${currentChatWith}`).push({
      fromId: currentUser.id,
      text: text,
      type: 'text',
      time: Date.now()
    });
    input.value = '';
  }

  async function sendImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      const fileName = `chat/${currentUser.id}_${Date.now()}.jpg`;
      const uploadTask = storage.ref(fileName).put(file);
      uploadTask.on('state_changed', null, null, async () => {
        const url = await uploadTask.snapshot.ref.getDownloadURL();
        await db.ref(`messages/${currentUser.id}_${currentChatWith}`).push({
          fromId: currentUser.id,
          url: url,
          type: 'image',
          time: Date.now()
        });
      });
    };
    input.click();
  }

  function closeChat() {
    currentChatWith = null;
    document.getElementById('chatList').style.display = 'block';
    document.getElementById('chatWindow').style.display = 'none';
  }

  async function loadConversations() {
    const container = document.getElementById('conversationsList');
    container.innerHTML = '';
    // تبسيط: عرض الأصدقاء كمحادثات
    const friends = currentUser.friends || {};
    for (let friendId of Object.keys(friends)) {
      const friendSnap = await db.ref(`users/${friendId}`).once('value');
      const friend = friendSnap.val();
      if (friend) {
        container.innerHTML += `
          <div class="friend-card" onclick="startChat('${friendId}', '${friend.username}')">
            <div class="friend-info">
              <div class="friend-avatar">👤</div>
              <div>${friend.username}</div>
            </div>
            <i class="fas fa-comment"></i>
          </div>
        `;
      }
    }
  }

  function switchPage(page) {
    document.getElementById('storiesPage').style.display = page === 'stories' ? 'block' : 'none';
    document.getElementById('friendsPage').style.display = page === 'friends' ? 'block' : 'none';
    document.getElementById('chatPage').style.display = page === 'chat' ? 'block' : 'none';
    
    const navs = document.querySelectorAll('.nav-item');
    navs.forEach((nav, idx) => {
      nav.classList.remove('active');
      if ((page === 'stories' && idx === 0) || (page === 'friends' && idx === 1) || (page === 'chat' && idx === 2)) {
        nav.classList.add('active');
      }
    });
    
    if (page === 'friends') loadFriends();
    if (page === 'chat') loadConversations();
  }

  function showFriendsTab(tab) {
    document.getElementById('friendsList').style.display = tab === 'friends' ? 'block' : 'none';
    document.getElementById('requestsList').style.display = tab === 'requests' ? 'block' : 'none';
    document.getElementById('searchList').style.display = tab === 'search' ? 'block' : 'none';
  }

  async function loadSounds() {
    const snapshot = await db.ref('sounds').once('value');
    const sounds = snapshot.val();
    const container = document.getElementById('soundsList');
    container.innerHTML = '';
    if (sounds) {
      Object.values(sounds).forEach(sound => {
        container.innerHTML += `<div class="sound-item" onclick="selectSound('${sound.url}')">🎵 ${sound.name}</div>`;
      });
    }
  }

  function selectSound(url) {
    selectedSound = url;
    alert('تم اختيار الصوت!');
    closeSoundPicker();
    const audio = new Audio(url);
    audio.play();
  }

  function showSounds() {
    document.getElementById('soundPicker').style.display = 'block';
  }

  function closeSoundPicker() {
    document.getElementById('soundPicker').style.display = 'none';
  }

  function isBlocked(userId) {
    return currentUser.blocked?.[userId];
  }

  async function blockUser(userId) {
    await db.ref(`users/${currentUser.id}/blocked/${userId}`).set(true);
    alert('تم حظر المستخدم');
    loadFriends();
  }
</script>
</body>
</html>
